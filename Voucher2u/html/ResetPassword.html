<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Optima Bank</title>
    <link rel="stylesheet" href="../css/ResetPassword.css">
</head>
<body>

<div class="reset-container">
    <div class="reset-box">
        <div class="reset-form">
            <!-- Logo added here -->
            <div class="logo">
                <img src="../assets/logo.png" alt="Optima Bank Logo">
            </div>
            <h2>Reset Your Password</h2>
            <p>Please enter your new password below.</p>
            
            <form id="resetPasswordForm">
                <input type="password" id="newPassword" name="new_password" placeholder="Enter new password" required>
                <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm new password" required>
                <button type="submit" id="resetBtn">Reset Password</button>
            </form>
            
            <div id="message"></div>
            
            <div class="back-to-login">
                <a href="LoginPage.html">← Back to Login</a>
            </div>
        </div>
    </div>
</div>

<script src="../js/resetPassword.js"></script>
</body>
</html>
